version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: polymarket
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d polymarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/.chroma/index
    ports:
      - "8000:8000"
    environment:
      - ALLOW_RESET=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Main Trading System ─────────────────────────────────────────────────────

  agents:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://trader:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polymarket
      - CHROMA_URL=http://chromadb:8000
    volumes:
      - model_data:/app/data/models
      - ./logs:/app/logs
    ports:
      - "8001:8001"   # Prometheus metrics
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: ["python", "main.py"]

  agents_dryrun:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://trader:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polymarket
      - CHROMA_URL=http://chromadb:8000
    volumes:
      - model_data:/app/data/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "main.py", "--dry-run"]
    profiles: ["dryrun"]  # only starts with: docker compose --profile dryrun up

  # ── Celery Worker (nightly retrain + postmortems) ───────────────────────────

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://trader:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polymarket
    volumes:
      - model_data:/app/data/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["celery", "-A", "core.bus", "worker", "-Q", "retrain,postmortem", "--concurrency=2", "--loglevel=info"]

  # ── Dashboard ───────────────────────────────────────────────────────────────

  dashboard_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://trader:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polymarket
      - PROMETHEUS_URL=http://agents:8001
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:4173"]
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - dashboard_api

  # ── Monitoring ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

volumes:
  redis_data:
  pg_data:
  chroma_data:
  model_data:
  prometheus_data:
  grafana_data:
