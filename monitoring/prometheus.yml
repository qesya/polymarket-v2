global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "polymarket-agents"
    static_configs:
      - targets: ["agents:8001"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
